<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="incoming.css">
</head>
<body>

<div class="page">

  <div class="page-header">
    <h2>Pending Order History</h2>
    
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Date</th>
          <th>Shopkeeper</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>#100230</td>
          <td>12 Feb 2026</td>
          <td>Rahul Sharma</td>
          <td><span class="status pending">Pending</span></td>
          <td><button class="view-btn">View</button></td>
        </tr>

        <tr>
          <td>#100726</td>
          <td>10 Feb 2026</td>
          <td>Navin Mehta</td>
          <td><span class="status pending">Pending</span></td>
          <td><button class="view-btn">View</button></td>
        </tr>

        <tr>
          <td>#100017</td>
          <td>08 Feb 2026</td>
          <td>Vikas Patil</td>
          <td><span class="status pending">Pending</span></td>
          <td><button class="view-btn">View</button></td>
        </tr>

        <tr>
          <td>#100739</td>
          <td>05 Feb 2026</td>
          <td>Mohan Singh</td>
          <td><span class="status pending">Pending</span></td>
          <td><button class="view-btn">View</button></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="pagination">
    <button class="page-btn">‹</button>
    <button class="page-btn active">1</button>
    <button class="page-btn">2</button>
    <button class="page-btn">›</button>
  </div>

</div>

<script>
  const paginationContainer = document.querySelector(".pagination");

  const totalPages = 10;   // Total pages
  let currentPage = 1;

  function renderPagination() {
    paginationContainer.innerHTML = "";

    // Previous Button
    const prevBtn = document.createElement("button");
    prevBtn.textContent = "‹";
    prevBtn.className = "page-btn";
    prevBtn.disabled = currentPage === 1;
    prevBtn.onclick = () => {
      if (currentPage > 1) {
        currentPage--;
        renderPagination();
      }
    };
    paginationContainer.appendChild(prevBtn);

    // Page numbers logic
    for (let i = 1; i <= totalPages; i++) {
      if (
        i === 1 || 
        i === totalPages || 
        (i >= currentPage - 1 && i <= currentPage + 1)
      ) {
        const pageBtn = document.createElement("button");
        pageBtn.textContent = i;
        pageBtn.className = "page-btn";
        if (i === currentPage) {
          pageBtn.classList.add("active");
        }
        pageBtn.onclick = () => {
          currentPage = i;
          renderPagination();
        };
        paginationContainer.appendChild(pageBtn);
      } 
      else if (
        i === currentPage - 2 || 
        i === currentPage + 2
      ) {
        const dots = document.createElement("span");
        dots.textContent = "...";
        dots.style.margin = "0 5px";
        paginationContainer.appendChild(dots);
      }
    }

    // Next Button
    const nextBtn = document.createElement("button");
    nextBtn.textContent = "›";
    nextBtn.className = "page-btn";
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.onclick = () => {
      if (currentPage < totalPages) {
        currentPage++;
        renderPagination();
      }
    };
    paginationContainer.appendChild(nextBtn);
  }

  renderPagination();
  
  // Redirect when View button clicked
  document.querySelectorAll(".view-btn").forEach(button => {
    button.addEventListener("click", function () {

      // Get wholesaler name from same row
      const row = this.closest("tr");
      const wholesalerName = row.children[2].innerText;

      // Redirect to chat page with name in URL
      window.location.href = "chat.html?store=" + encodeURIComponent(wholesalerName);
    });
  });
</script>

</body>
</html>
