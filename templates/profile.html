<!doctype html>
<html>
<head>
  <title>My Profile - Grocify</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="profile.css">
</head>

<body>

<h2 style="padding:15px 40px;">My Profile</h2>

<div class="profile-container">
  <div class="profile-card">

    <div class="profile-header">
      <div class="avatar" id="avatarInitial"></div>
      <h3 id="displayName"></h3>
      <p id="accountType"></p>
    </div>

    <div class="profile-body">

      <div class="form-group">
        <label>Full Name / Business Name</label>
        <input type="text" id="name">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email">
      </div>

      <div class="form-group">
        <label>Mobile Number</label>
        <input type="text" id="mobile">
      </div>

      <div class="form-group">
        <label>Business Address</label>
        <input type="text" id="address">
      </div>

      <div class="form-group">
  <label>Account Type</label>
  <select id="type">
    <option value="" disabled selected>Select Account Type</option>
    <option value="shopkeeper">Shopkeeper</option>
    <option value="wholesaler">Wholesaler</option>
  </select>
</div>

      <div class="button-group">
        <button class="edit-btn" onclick="enableEdit()">Edit</button>
        <button class="save-btn" onclick="saveProfile()">Save</button>
        <button onclick="parent.loadPage('products.html')">Back to Dashboard</button>
      </div>

    </div>
  </div>
</div>

<script>
window.onload = function () {
  const user = JSON.parse(localStorage.getItem("grocifyUser"));

  if (user) {
  document.getElementById("name").value = user.name;
  document.getElementById("email").value = user.email;
  document.getElementById("mobile").value = user.mobile;
  document.getElementById("address").value = user.address;

  if (user.type) {
    document.getElementById("type").value = user.type;
  }

  document.getElementById("displayName").innerText = user.name;
  document.getElementById("accountType").innerText = user.type;

  document.getElementById("avatarInitial").innerText =
    user.name.charAt(0).toUpperCase();
}
};

function enableEdit() {
  document.querySelectorAll(".form-group input, .form-group select").forEach(element => {
    element.disabled = false;
  });
}

function saveProfile() {
  const updatedUser = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    mobile: document.getElementById("mobile").value,
    address: document.getElementById("address").value,
    type: document.getElementById("type").value,
  };

  localStorage.setItem("grocifyUser", JSON.stringify(updatedUser));
  alert("Profile Updated Successfully!");
  location.reload();
}
</script>

</body>
</html>
