<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grocery - Bazaar One</title>
    <link rel="stylesheet" href="grocery.css" />
  </head>
  <body>
    <div class="dashboard">
      <!-- Main Content -->
      <div class="main-content">
        <div class="content-wrapper">
          <div class="category-section">
            <div class="breadcrumb">
              <h2>
                <a href="products.html">Products</a>
                <span> → </span>
                <a href="dairy.html">Dairy</a>
              </h2>
            </div>

           <div class="category-grid">

            <!-- Product 1 -->
            <div class="category-card">
              <img src="milk.png" alt="Milk">
              <h3>Amul Milk(500 ml)</h3>
              <h4>Rs 50/-</h4>

              <div class="action-area">
                <button class="btn add-btn">Add Item</button>

                <div class="quantity-box hidden">
                  <button class="qty-btn minus">−</button>
                  <span class="qty">1</span>
                  <button class="qty-btn plus">+</button>
                </div>
              </div>
            </div>

            <!-- Product 2 -->
            <div class="category-card">
              <img src="paneer.png" alt="Paneer">
              <h3> Paneer (500g)</h3>
              <h4>Rs 100/-</h4>

              <div class="action-area">
                <button class="btn add-btn">Add Item</button>

                <div class="quantity-box hidden">
                  <button class="qty-btn minus">−</button>
                  <span class="qty">1</span>
                  <button class="qty-btn plus">+</button>
                </div>
              </div>
            </div>


          </div>


          </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
  document.querySelectorAll(".category-card").forEach((card) => {
    const addBtn = card.querySelector(".add-btn");
    const qtyBox = card.querySelector(".quantity-box");
    const qtyDisplay = card.querySelector(".qty");
    const plusBtn = card.querySelector(".plus");
    const minusBtn = card.querySelector(".minus");

    let quantity = 0;

    // Make quantity editable when clicked
    qtyDisplay.addEventListener("click", () => {
      const input = document.createElement("input");
      input.type = "number";
      input.min = "1";
      input.value = quantity;
      input.style.width = "40px";

      qtyDisplay.replaceWith(input);
      input.focus();

      // When user finishes typing
      input.addEventListener("blur", () => {
        let newQty = parseInt(input.value);

        if (isNaN(newQty) || newQty <= 0) {
          quantity = 0;
          qtyBox.classList.add("hidden");
          addBtn.style.display = "inline-block";
        } else {
          quantity = newQty;
          qtyDisplay.textContent = quantity;
          input.replaceWith(qtyDisplay);
        }
      });
    });

    // When Add Item clicked
    addBtn.addEventListener("click", () => {
      quantity = 1;
      qtyDisplay.textContent = quantity;
      addBtn.style.display = "none";
      qtyBox.classList.remove("hidden");
    });

    // When + clicked
    plusBtn.addEventListener("click", () => {
      quantity++;
      qtyDisplay.textContent = quantity;
    });

    // When - clicked
    minusBtn.addEventListener("click", () => {
      quantity--;

      if (quantity <= 0) {
        quantity = 0;
        qtyBox.classList.add("hidden");
        addBtn.style.display = "inline-block";
      } else {
        qtyDisplay.textContent = quantity;
      }
    });
  });
</script>
  </body>
</html>
