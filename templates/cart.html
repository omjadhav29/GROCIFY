<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="cart.css">
</head>
<body>

<div class="page">

  <h2>Shopping Cart</h2>

  <div class="cart-container">

    <!-- Cart Items -->
    <div class="cart-items">

      <div class="cart-item">
        <img src="grocery.jpg" alt="Product">

        <div class="item-details">
          <h4>Rice 5kg</h4>
          <p class="price">₹250</p>
        </div>

        <div class="quantity">
          <button>-</button>
          <input type="text" value="2">
          <button>+</button>
        </div>

        <div class="subtotal">
          ₹500
        </div>

        <button class="remove-btn">✕</button>
      </div>

      <div class="cart-item">
        <img src="beverages.png" alt="Product">

        <div class="item-details">
          <h4>Cold Drink</h4>
          <p class="price">₹40</p>
        </div>

        <div class="quantity">
          <button>-</button>
          <input type="text" value="3">
          <button>+</button>
        </div>

        <div class="subtotal">
          ₹120
        </div>

        <button class="remove-btn">✕</button>
      </div>

    </div>

    <!-- Cart Summary -->
    <div class="cart-summary">
      <h3>Order Summary</h3>

      <div class="summary-row">
        <span>Subtotal</span>
        <span>₹620</span>
      </div>

      <div class="summary-row">
        <span>Tax (5%)</span>
        <span>₹31</span>
      </div>

      <div class="summary-row total">
        <span>Total</span>
        <span>₹651</span>
      </div>

      <button class="checkout-btn">Proceed to Checkout</button>
    </div>

  </div>

</div>

<script>
  function updateCart() {
    let cartItems = document.querySelectorAll(".cart-item");
    let subtotal = 0;

    cartItems.forEach(item => {
      const priceText = item.querySelector(".price").textContent;
      const price = parseInt(priceText.replace("₹", ""));
      const qtyInput = item.querySelector(".quantity input");
      const quantity = parseInt(qtyInput.value) || 0;

      const itemSubtotal = price * quantity;
      item.querySelector(".subtotal").textContent = "₹" + itemSubtotal;

      subtotal += itemSubtotal;
    });

    const tax = subtotal * 0.05;
    const total = subtotal + tax;

    // Update Order Summary Properly
    const summaryRows = document.querySelectorAll(".cart-summary .summary-row");

    summaryRows[0].querySelector("span:last-child").textContent = "₹" + subtotal;
    summaryRows[1].querySelector("span:last-child").textContent = "₹" + tax.toFixed(0);
    summaryRows[2].querySelector("span:last-child").textContent = "₹" + total.toFixed(0);
  }

  document.querySelectorAll(".cart-item").forEach(item => {

    const minusBtn = item.querySelector(".quantity button:first-child");
    const plusBtn = item.querySelector(".quantity button:last-child");
    const qtyInput = item.querySelector(".quantity input");
    const removeBtn = item.querySelector(".remove-btn");

    plusBtn.addEventListener("click", () => {
      qtyInput.value = parseInt(qtyInput.value) + 1;
      updateCart();
    });

    minusBtn.addEventListener("click", () => {
      let currentQty = parseInt(qtyInput.value);
      if (currentQty > 1) {
        qtyInput.value = currentQty - 1;
      }
      updateCart();
    });

    qtyInput.addEventListener("input", () => {
      if (qtyInput.value <= 0 || isNaN(qtyInput.value)) {
        qtyInput.value = 1;
      }
      updateCart();
    });

    removeBtn.addEventListener("click", () => {
      item.remove();
      updateCart();
    });
  });

  // Initial calculation on page load
  updateCart();
</script>

</body>
</html>
